name = "wasm-prompt-firewall"
main = "build/worker/shim.mjs"
compatibility_date = "2024-12-01"
workers_dev = true
# Requires Workers Paid plan ($5/mo) for benchmarking.
# Free tier rate limits cause 41% errors at 50 concurrent VUs.
usage_model = "standard"

[vars]
INFERENCE_URL = "https://your-inference-service.example.com"
GATEWAY_REGION = "global (edge)"
GATEWAY_PLATFORM = "Cloudflare Workers"

[[kv_namespaces]]
binding = "MODERATION_CACHE"
id = "de1f12ee8a9849f28ea9acda5aaace3a"

[build]
command = "cargo install -q worker-build && worker-build --release"
