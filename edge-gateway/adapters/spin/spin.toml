spin_manifest_version = 2

[application]
name = "wasm-prompt-firewall"
version = "1.0.0"
description = "WASM-Powered Content Moderation Gateway at the Edge"

[variables]
inference_url = { default = "" }
gateway_platform = { default = "spin" }
gateway_region = { default = "local" }

# --- API routes → gateway WASM ---

[[trigger.http]]
route = "/gateway/..."
component = "gateway"

[[trigger.http]]
route = "/api/..."
component = "gateway"

# --- Frontend → static fileserver (also serves /samples/) ---

[[trigger.http]]
route = "/..."
component = "frontend"

[component.gateway]
source = "../../target/wasm32-wasip1/release/clipclap_gateway_spin.wasm"
allowed_outbound_hosts = []
key_value_stores = ["default"]
files = []

[component.gateway.variables]
inference_url = "{{ inference_url }}"
gateway_platform = "{{ gateway_platform }}"
gateway_region = "{{ gateway_region }}"

[component.gateway.build]
command = "cargo build --target wasm32-wasip1 --release --manifest-path ../../Cargo.toml -p clipclap-gateway-spin"

[component.frontend]
source = "spin_static_fs.wasm"
files = [{ source = "static/", destination = "/" }]
