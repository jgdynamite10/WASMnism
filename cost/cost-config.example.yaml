# WASMnism Cost Configuration
# Copy to cost-config.yaml and fill in real values from your platform dashboards.
# NEVER commit cost-config.yaml (contains account-specific pricing).
# Pricing verified: April 2026

platforms:
  fastly:
    compute_request_per_1m: 0.50
    compute_vcpu_ms_per_1m: 0.05
    cdn_bandwidth_per_gb: 0.12       # NA/EU rate
    cdn_request_per_1m: 1.00         # $0.01 per 10K
    kv_read_per_1m: 0.55             # Class B operations
    kv_write_per_1m: 6.50            # Class A, $0.65 per 100K
    free_compute_requests: 10000000  # 10M/mo
    free_vcpu_ms: 100000000          # 100M/mo
    free_cdn_bandwidth_gb: 100
    free_cdn_requests: 1000000       # 1M/mo
    notes: "Source: fastly.com/pricing (April 2026)"

  fermyon:
    starter_monthly: 0.00
    starter_requests: 100000         # 100K/mo
    growth_monthly: 19.38
    growth_requests: 1000000         # 1M/mo
    bandwidth_per_gb: 0.00           # included in plan
    notes: "Source: fermyon.com/pricing — plan-based, no per-ms compute billing"

  akamai:
    pricing: "contract-based"
    notes: "Not publicly listed. Contact Akamai sales for quote."

  workers:
    platform_monthly: 5.00
    request_per_1m: 0.30             # after 10M included
    cpu_ms_per_1m: 0.02              # after 30M included
    bandwidth_per_gb: 0.00           # free
    kv_read_per_1m: 0.50
    kv_write_per_1m: 5.00
    free_requests: 10000000          # 10M/mo with $5 plan
    free_cpu_ms: 30000000            # 30M/mo
    notes: "Source: developers.cloudflare.com/workers/platform/pricing"

  lambda:
    request_per_1m: 0.20
    compute_per_gb_second: 0.0000133334  # ARM64 rate
    memory_mb: 128
    bandwidth_per_gb: 0.09
    free_requests: 1000000           # 1M/mo
    free_gb_seconds: 400000          # 400K GB-s/mo
    notes: "Source: aws.amazon.com/lambda/pricing — ARM64, us-east-1"

benchmark:
  avg_response_size_kb: 0.7          # measured from /gateway/moderate
  avg_request_size_kb: 0.2
  avg_cpu_ms_fastly: REPLACE_ME      # fill from your benchmark medians
  avg_cpu_ms_akamai: REPLACE_ME      # fill from your benchmark medians
  avg_cpu_ms_fermyon: REPLACE_ME     # fill from your benchmark medians
  avg_cpu_ms_workers: REPLACE_ME     # fill from your benchmark medians
  avg_cpu_ms_lambda: REPLACE_ME      # fill from your benchmark medians
  cache_hit_rate: 0.0                # basic test, no caching
